<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>家务积分🧹</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<style>
html { font-size: 18px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Microsoft YaHei", sans-serif;
  background: #f2f3f7;
  margin: 0;
  padding: 16px;
  overflow-x: hidden;
}
.container { max-width: 500px; margin: 0 auto; }

h2 { text-align: center; font-size: 28px; margin-bottom: 14px; color:#1d1d1f; }
h3 { font-size: 22px; margin-bottom: 8px; color:#1d1d1f; }

.card {
  background: white;
  padding: 20px;
  border-radius: 24px;
  margin-bottom: 16px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.08);
  line-height: 1.8;
  word-wrap: break-word;
}

.status { text-align: center; font-size: 16px; margin-top: 8px; opacity: 0.7; }

#dateText, #currentUserText { font-size: 18px; line-height: 1.8; text-align: center; display: block; }

.score-board { text-align: center; font-size: 20px; font-weight: 600; color:#007aff; transition: all 0.3s ease; }

@keyframes scoreJump { 0% { transform: scale(1); } 30% { transform: scale(1.15); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }

.task-grid { display: flex; flex-direction: column; gap: 12px; }
.task-category { margin-bottom: 12px; }
.category-title { font-weight: 600; margin-bottom: 6px; font-size: 18px; color:#1d1d1f; }
.task-row { display: flex; justify-content: flex-start; align-items: center; flex-wrap: nowrap; gap: 6px; overflow-x: auto; }
.task-button {
  font-size: 16px;
  padding: 10px;
  background: linear-gradient(135deg, #c2e0ff, #e0f0ff);
  color: #004080;
  box-shadow: 0 3px 12px rgba(0,0,0,0.1);
  border: none; border-radius: 14px;
  cursor: pointer;
  flex-shrink: 0;
  min-width: 90px;
  transition: all 0.15s ease;
}
.task-button:hover { transform: scale(1.03); }
.task-button:active { transform: scale(0.95); transition: transform 0.1s; }

button { border: none; border-radius: 16px; padding: 8px 12px; margin: 2px; font-size: 14px; cursor: pointer; transition: all 0.15s ease; }
button:hover { transform: scale(1.05); }

.primary { background: #ffcce0; color: #800040; }

input, select, textarea { padding: 8px; font-size: 14px; width: 100%; margin: 6px 0; display: block; border-radius: 12px; border: 2px solid #ccc; box-sizing: border-box; }

.record-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 16px;
  background: #f9f9f9;
  border-radius: 12px;
  padding: 8px 12px;
  align-items: center;
}
.record-item:nth-child(even) { background: #f0f0f0; }

.user-select-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.user-btn-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

@media (max-width: 480px) {
  html { font-size: 14px; }
  h2 { font-size: 24px; }
  h3 { font-size: 20px; }
  #dateText, #currentUserText { font-size: 15px; line-height: 1.8; }
  .score-board { font-size: 16px; }
  .task-button { font-size: 14px; padding: 8px; min-width: 70px; }
  button { font-size: 12px; padding: 6px 8px; }
  input, select, textarea { font-size: 12px; padding: 6px; }
  .record-item { font-size: 14px; padding: 6px 10px; }
}
</style>
</head>
<body>
<div class="container">

<!-- 登录/注册界面 -->
<div id="loginCard" class="card">
  <h2>家务积分🧹</h2>
  <div class="status" id="loginStatus">请输入家庭ID和密码登录，或创建新家庭</div>

  <input id="familyID" placeholder="家庭ID">
  <input id="familyPassword" type="password" placeholder="密码">
  <textarea id="familyMembers" placeholder="家庭成员姓名，用逗号分隔 (2-7人)"></textarea>
  <button class="primary" onclick="registerFamily()">注册新家庭</button>
  <button onclick="loginFamily()">登录</button>
</div>

<!-- 家庭积分主界面 -->
<div id="mainCard" style="display:none;">
  <div class="card" style="text-align:center;">
    📅 <span id="dateText"></span><br>
    👤 当前用户：<b id="currentUserText">未选择</b>
    <div class="user-select-container" id="memberButtons"></div>
    <div class="status" id="syncStatus">🟡 初始化中...</div>
  </div>

  <div class="card">
    <div class="score-board" id="scoreBoard">-- : --</div>
  </div>

  <div class="card">
    <h3>家务任务</h3>
    <div id="tasks" class="task-grid"></div>
  </div>

  <div class="card">
    <h3>添加任务</h3>
    <input id="newTask" placeholder="新任务">
    <input id="newScore" type="number" placeholder="分数">
    <select id="newCategory">
      <option value="厨房">厨房</option>
      <option value="洗刷">洗刷</option>
      <option value="清洁">清洁</option>
      <option value="植物">植物</option>
      <option value="其他">其他</option>
    </select>
    <button class="primary" onclick="addTask()">添加任务</button>
  </div>

  <div class="card">
    <h3>📜 记录</h3>
    <div id="records"></div>
    <button id="showMoreBtn" onclick="showMoreRecords()">展开更多</button>
  </div>
</div>

</div>

<script>
const BIN_ID = "69ba72d9c3097a1dd536bcad";
const API_KEY = "$2a$10$6pBPrU9SDFjVuN0RpIVh5..BJJOobImUPggq1ftD62HC10eoPjK0a";

let families = {};
let currentFamilyID = "";
let currentFamily = null;
let currentUser = "";
let lastClickTime = 0;
let displayCount = 5;

const tasksDiv = document.getElementById("tasks");
const recordsDiv = document.getElementById("records");
const showMoreBtn = document.getElementById("showMoreBtn");
const syncStatus = document.getElementById("syncStatus");
const scoreBoard = document.getElementById("scoreBoard");
const memberButtonsDiv = document.getElementById("memberButtons");

function setStatus(text){ syncStatus.innerText=text; }
function formatDate(){ const d=new Date(); const days=["日","一","二","三","四","五","六"]; return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} 星期${days[d.getDay()]}`; }
document.getElementById("dateText").innerText=formatDate();

// —— JSONBin 操作
async function loadFamilies(){
    setStatus("🟡 同步云端中...");
    try{
        const res = await axios.get(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": API_KEY } });
        families = res.data.record.families || {};
        setStatus("🟢 已同步");
    }catch(e){
        setStatus("🔴 云端同步失败");
        families = {};
    }
}
async function saveFamilies(){
    setStatus("🟡 保存中...");
    try{
        await axios.put(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { families }, { headers: { "X-Master-Key": API_KEY, "Content-Type":"application/json" } });
        setStatus("🟢 已保存");
    }catch(e){
        setStatus("🔴 保存失败");
    }
}

// —— 注册/登录
function registerFamily(){
    const id = document.getElementById("familyID").value.trim();
    const pwd = document.getElementById("familyPassword").value.trim();
    const membersText = document.getElementById("familyMembers").value.trim();
    if(!id || !pwd || !membersText) return alert("请填写家庭ID、密码和成员姓名");
    const members = membersText.split(",").map(s=>s.trim()).filter(s=>s);
    if(members.length <2 || members.length>7) return alert("成员人数必须为2-7人");
    if(families[id]) return alert("家庭ID已存在，请选择其他ID");
    families[id] = { 
      password: pwd, 
      members, 
      tasks:{
        "厨房":[["采购食材🥯",2],["准备早餐🥛",1],["洗菜切菜🥬",1],["炒菜/煮面🥩",2],["洗锅擦灶🧽",1],["清理餐桌🥣",1],["清洗碗机🍴",1]],
        "洗刷":[["洗衣服👔",1],["晾衣服👖",1],["收/叠衣服",1],["刷鞋子👟",1],["换床单🛏️",2],["换洗窗帘",3]],
        "清洁":[["刷马桶🚽",1],["刷浴室💦",2],["刷水池🪥",1],["清下水道",2],["倒垃圾🗑️",1],
        "植物":[["浇水🪴",1],["除虫🐛",1]],
        "其他":[]
      }, 
      records:[]
    };
    saveFamilies().then(()=>{ alert("注册成功！请登录"); });
}

function loginFamily(){
    const id = document.getElementById("familyID").value.trim();
    const pwd = document.getElementById("familyPassword").value.trim();
    if(!families[id]) return alert("家庭ID不存在");
    if(families[id].password!==pwd) return alert("密码错误");
    currentFamilyID=id;
    currentFamily=families[id];
    showMainInterface();
}

// —— 家庭界面初始化
function showMainInterface(){
    document.getElementById("loginCard").style.display="none";
    document.getElementById("mainCard").style.display="block";
    renderMemberButtons();
    renderTasks();
    updateAll();
}

function renderMemberButtons(){
    memberButtonsDiv.innerHTML="";
    currentFamily.members.forEach(name=>{
        let btn=document.createElement("button");
        btn.innerText=name;
        btn.onclick=()=>{ currentUser=name; document.getElementById("currentUserText").innerText=name; };
        memberButtonsDiv.appendChild(btn);
    });
}

// —— 任务与记录
function addTask(){
  let t=document.getElementById("newTask").value.trim();
  let s=parseInt(document.getElementById("newScore").value);
  let cat=document.getElementById("newCategory").value;
  if(!t||!s) return alert("请输入任务和分数");
  if(!currentFamily.tasks[cat]) currentFamily.tasks[cat]=[];
  currentFamily.tasks[cat].push([t,s]);
  saveFamilies();
  renderTasks();
  document.getElementById("newTask").value="";
  document.getElementById("newScore").value="";
}

function renderTasks(){
  tasksDiv.innerHTML="";
  const categories = ["厨房","洗刷","清洁","植物","其他"];
  categories.forEach(cat=>{
    if(!currentFamily.tasks[cat]) return;
    currentFamily.tasks[cat].forEach((t,index)=>{
      let row=document.createElement("div"); row.className="task-row";
      
      let btn=document.createElement("button"); btn.className="task-button"; btn.innerText=t[0]+" +"+t[1];
      btn.onclick=()=>{ addRecord(t[0],t[1]); };

      let editBtn = document.createElement("button");
      editBtn.innerText = "✏️";
      editBtn.onclick = () => {
        let newName = prompt("新任务名称", t[0]);
        if (newName === null) return;
        let newScore = prompt("新分数", t[1]);
        if (newScore === null) return;
        newScore = parseInt(newScore);
        if (isNaN(newScore)) { alert("分数必须是数字"); return; }
        currentFamily.tasks[cat][index] = [newName.trim()||t[0], newScore];
        saveFamilies();
        renderTasks();
        updateAll();
      };

      let delBtn = document.createElement("button");
      delBtn.innerText = "🗑️";
      delBtn.onclick = () => {
        if(!confirm("确定删除此任务？")) return;
        currentFamily.tasks[cat].splice(index,1);
        saveFamilies();
        renderTasks();
      };

      row.appendChild(btn); row.appendChild(editBtn); row.appendChild(delBtn);
      tasksDiv.appendChild(row);
    });
  });
}

function addRecord(task,score){
    let now=Date.now();
    if(now-lastClickTime<500) return;
    lastClickTime=now;
    if(!currentUser)return alert("请先选择成员");
    let month=new Date().toISOString().slice(0,7);
    currentFamily.records.push({name:currentUser, task, score, time:new Date().toISOString(), month});
    saveFamilies();
    updateAll();
}

function calcScores(month){ 
    let scores={}; 
    currentFamily.records.forEach(r=>{ if(r.month!==month) return; scores[r.name]=(scores[r.name]||0)+r.score; }); 
    return scores; 
}

function renderRecords(){
    recordsDiv.innerHTML="";
    let visibleRecords=currentFamily.records.slice(-displayCount).reverse();
    visibleRecords.forEach((r)=>{
        const div=document.createElement("div"); div.className="record-item";
        div.innerHTML=`<span>${r.name} ${r.task} +${r.score}</span>`;
        recordsDiv.appendChild(div);
    });
    showMoreBtn.style.display=currentFamily.records.length>displayCount?"block":"none";
}

function showMoreRecords(){ displayCount+=10; renderRecords(); }

function renderScoreBoard(){ 
    let scores=calcScores(new Date().toISOString().slice(0,7)); 
    const members = currentFamily.members;
    let text = members.map(n => {
        let crown = "";
        let s = scores[n]||0;
        if(Object.values(scores).length>1){
          if(s===Math.max(...Object.values(scores))) crown=" 👑";
        }
        return `${n}${crown} ${s}分`;
    }).join("  vs  ");
    scoreBoard.innerText=text;
}

function updateAll(){ renderRecords(); renderScoreBoard(); }

loadFamilies();
</script>
</body>
</html>
